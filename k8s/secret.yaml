apiVersion: v1
kind: Secret
metadata:
  name: slotify-secrets
type: Opaque
data:
  DATABASE_URL: <base64-encoded-production-db-url>
  
  BETTER_AUTH_SECRET: <base64-encoded-secret>
  BETTER_AUTH_URL: <base64-encoded-production-url>
  
  RAZORPAY_KEY_ID: <base64-encoded-value>
  RAZORPAY_KEY_SECRET: <base64-encoded-value>
  RAZORPAY_WEBHOOK_SECRET: <base64-encoded-value>
  RESEND_API_KEY: <base64-encoded-value>
  RESEND_FROM_EMAIL: <base64-encoded-value>
  GOOGLE_CLIENT_ID: <base64-encoded-value>
  GOOGLE_CLIENT_SECRET: <base64-encoded-value>
  NEXT_PUBLIC_APP_URL: <base64-encoded-value>
