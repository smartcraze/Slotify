apiVersion: apps/v1
kind: Deployment
metadata:
  name: slotify-app
  labels:
    app: slotify
spec:
  replicas: 2 # Adjust based on your traffic needs
  selector:
    matchLabels:
      app: slotify
  template:
    metadata:
      labels:
        app: slotify
    spec:
      containers:
        - name: slotify-app
          image: smartcraze/slotify:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: slotify-secrets
          # Next.js standalone runner health checks
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
