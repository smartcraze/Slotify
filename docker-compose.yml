
services:
  db:
    image: postgres:16
    container_name: slotify-db
    restart: always

    environment:
      POSTGRES_USER: slotify
      POSTGRES_PASSWORD: slotify
      POSTGRES_DB: slotify

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotify"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: smartcraze/slotify:latest
    build:
      context: .
      secrets:
        - env   

    container_name: slotify-app
    restart: always

    ports:
      - "3000:3000"

    environment:
      - DATABASE_URL=postgresql://slotify:slotify@db:5432/slotify?sslmode=disable

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

secrets:
  env:
    file: .env